<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OpenClaw Ecosystem Briefing</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{--background:#f8fafc;--foreground:#0f172a;--card:#fff;--card-foreground:#0f172a;--muted:#f1f5f9;--muted-foreground:#64748b;--border:#e2e8f0;--primary:#0f172a;--primary-foreground:#fff;--radius:12px}
    body{font-family:Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;margin:0;background:var(--background);color:var(--foreground)}
    .wrap{max-width:1200px;margin:0 auto;padding:20px}
    h1{font-size:1.75rem;line-height:1.2;letter-spacing:-.02em;margin:0 0 8px}
    .layout{display:grid;grid-template-columns:300px 1fr;gap:14px}
    .panel{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px;box-shadow:0 1px 2px rgba(15,23,42,.04)}
    .btn{display:block;width:100%;margin:0 0 8px;padding:10px 12px;border:1px solid var(--border);border-radius:10px;background:var(--card);text-align:left;cursor:pointer;font-weight:500}
    .btn:hover{background:var(--muted)}
    .btn.active{border-color:#334155;background:#f8fafc}
    .meta{color:var(--muted-foreground);font-size:12px}
    .email{white-space:pre-wrap;line-height:1.65}
    a{color:#1d4ed8;text-decoration:none}
    a:hover{text-decoration:underline}
    .signal{border:1px solid var(--border);border-radius:10px;padding:10px;margin:0 0 8px;background:#fff}
    .run-row{border:1px solid var(--border);border-radius:10px;padding:8px;margin:0 0 8px;background:#fff}
    .run-actions{display:flex;gap:6px;margin-top:6px}
    .mini{padding:7px 8px;font-size:12px;margin:0}
    .raw-file{border:1px solid var(--border);border-radius:10px;padding:10px;margin:0 auto 10px;background:#fff;max-width:920px}
    .raw-file pre{white-space:pre-wrap;word-break:break-word;max-height:420px;overflow:auto;background:#f8fafc;border:1px solid var(--border);border-radius:8px;padding:10px}
    .section{border:1px solid var(--border);border-radius:10px;padding:8px;margin:0 0 10px;background:#fff}
    .section summary{cursor:pointer;font-weight:600}
    .desc{font-size:12px;color:var(--muted-foreground);margin:6px 0 10px}
    @media(max-width:900px){.layout{grid-template-columns:1fr}}
    @media(max-width:640px){.wrap{padding:12px}.panel{padding:10px}.raw-file{max-width:100%;padding:8px}.raw-file pre{font-size:12px;padding:8px}}
  </style>
</head>
<body>
<div class="wrap">
  <h1>OpenClaw Ecosystem Briefing</h1>
  <p class="meta">Daily runs + global signals index</p>

  <div class="tabs">
    <button id="tabRuns" class="tab active">View A: Dated briefing runs</button>
    <button id="tabSignals" class="tab">View B: Global Signals index</button>
  </div>

  <section id="runsView" class="card"></section>
  <section id="signalsView" class="card hidden"></section>

  <p class="meta">API: <a href="/api/runs">/api/runs</a> • <a href="/api/signals">/api/signals</a></p>
</div>
<script>
const tabRuns = document.getElementById('tabRuns');
const tabSignals = document.getElementById('tabSignals');
const runsView = document.getElementById('runsView');
const signalsView = document.getElementById('signalsView');

function showRuns(){ tabRuns.classList.add('active'); tabSignals.classList.remove('active'); runsView.classList.remove('hidden'); signalsView.classList.add('hidden'); }
function showSignals(){ tabSignals.classList.add('active'); tabRuns.classList.remove('active'); signalsView.classList.remove('hidden'); runsView.classList.add('hidden'); }
tabRuns.onclick = showRuns; tabSignals.onclick = showSignals;

(async function(){
  const runsData = await (await fetch('/runs.json')).json();
  const signalsData = await (await fetch('/signals.json')).json();

  const runs = [...runsData.runs].sort((a,b)=> b.date.localeCompare(a.date));
  runsView.innerHTML = '<h2>Dated runs</h2>' + runs.map(run => `
    <article class="run">
      <h3>${run.date}</h3>
      <p><strong>One-sentence take:</strong> ${run.oneSentenceTake}</p>
      <details><summary><strong>Original prompt</strong></summary><p>${run.prompt}</p></details>
      <h4>Tweets</h4>
      <ul>${run.tweets.map(t => `<li>${t.quote} → <a href="${t.url}" target="_blank">${t.label}</a></li>`).join('')}</ul>
      <h4>Papers</h4>
      <ul>${run.papers.map(p => `<li>${p.insight} → <a href="${p.url}" target="_blank">${p.title}</a>${(p.xDiscussion&&p.xDiscussion.length)?` (X: ${p.xDiscussion.map((x,i)=>`<a href="${x}" target="_blank">post ${i+1}</a>`).join(', ')})`:''}</li>`).join('')}</ul>
    </article>
  `).join('');

  signalsView.innerHTML = `<h2>Signals index</h2><p class="meta">Updated: ${signalsData.updatedAt}</p><ul>${signalsData.signals.map(s=>`<li><strong>${s.name}</strong> (${s.type}) — ${Object.entries(s.links).map(([k,v])=>`<a href="${v}" target="_blank">${k}</a>`).join(' · ')}</li>`).join('')}</ul>`;
})();
</script>
</body>
</html>
