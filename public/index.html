<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OpenClaw Ecosystem Briefing</title>
  <style>
    body{font-family:-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;background:#faf8f5;color:#1f1f1f;margin:0}
    .wrap{max-width:1000px;margin:0 auto;padding:28px}
    h1{font-size:32px;margin:0 0 10px}
    .meta{color:#666;font-size:13px}
    .tabs{display:flex;gap:8px;margin:14px 0}
    .tab{padding:8px 12px;border:1px solid #ddd;border-radius:8px;background:#fff;cursor:pointer}
    .tab.active{background:#111;color:#fff;border-color:#111}
    .card{background:#fff;border:1px solid #ece7e0;border-radius:10px;padding:14px;margin:10px 0}
    .run{padding:12px;border-top:1px solid #eee}
    .run:first-child{border-top:none}
    ul{margin:8px 0 0 18px}
    li{margin:8px 0}
    .hidden{display:none}
    a{color:#0b57d0}
  </style>
</head>
<body>
<div class="wrap">
  <h1>OpenClaw Ecosystem Briefing</h1>
  <p class="meta">Daily runs + global signals index</p>

  <div class="tabs">
    <button id="tabRuns" class="tab active">View A: Dated briefing runs</button>
    <button id="tabSignals" class="tab">View B: Global Signals index</button>
  </div>

  <section id="runsView" class="card"></section>
  <section id="signalsView" class="card hidden"></section>

  <p class="meta">API: <a href="/api/runs">/api/runs</a> • <a href="/api/signals">/api/signals</a></p>
</div>
<script>
const tabRuns = document.getElementById('tabRuns');
const tabSignals = document.getElementById('tabSignals');
const runsView = document.getElementById('runsView');
const signalsView = document.getElementById('signalsView');

function showRuns(){ tabRuns.classList.add('active'); tabSignals.classList.remove('active'); runsView.classList.remove('hidden'); signalsView.classList.add('hidden'); }
function showSignals(){ tabSignals.classList.add('active'); tabRuns.classList.remove('active'); signalsView.classList.remove('hidden'); runsView.classList.add('hidden'); }
tabRuns.onclick = showRuns; tabSignals.onclick = showSignals;

(async function(){
  const runsData = await (await fetch('/runs.json')).json();
  const signalsData = await (await fetch('/signals.json')).json();

  const runs = [...runsData.runs].sort((a,b)=> b.date.localeCompare(a.date));
  runsView.innerHTML = '<h2>Dated runs</h2>' + runs.map(run => `
    <article class="run">
      <h3>${run.date}</h3>
      <p><strong>One-sentence take:</strong> ${run.oneSentenceTake}</p>
      <details><summary><strong>Original prompt</strong></summary><p>${run.prompt}</p></details>
      <h4>Tweets</h4>
      <ul>${run.tweets.map(t => `<li>${t.quote} → <a href="${t.url}" target="_blank">${t.label}</a></li>`).join('')}</ul>
      <h4>Papers</h4>
      <ul>${run.papers.map(p => `<li>${p.insight} → <a href="${p.url}" target="_blank">${p.title}</a>${(p.xDiscussion&&p.xDiscussion.length)?` (X: ${p.xDiscussion.map((x,i)=>`<a href="${x}" target="_blank">post ${i+1}</a>`).join(', ')})`:''}</li>`).join('')}</ul>
    </article>
  `).join('');

  signalsView.innerHTML = `<h2>Signals index</h2><p class="meta">Updated: ${signalsData.updatedAt}</p><ul>${signalsData.signals.map(s=>`<li><strong>${s.name}</strong> (${s.type}) — ${Object.entries(s.links).map(([k,v])=>`<a href="${v}" target="_blank">${k}</a>`).join(' · ')}</li>`).join('')}</ul>`;
})();
</script>
</body>
</html>
