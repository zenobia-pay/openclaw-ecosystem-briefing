<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OpenClaw Ecosystem Briefing</title>
  <style>
    body{font-family:-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;background:#faf8f5;color:#1f1f1f;margin:0}
    .wrap{max-width:980px;margin:0 auto;padding:28px}
    h1{font-size:34px;margin:0 0 10px}
    .sub{color:#666}
    .card{background:#fff;border:1px solid #ece7e0;border-radius:10px;padding:16px;margin:14px 0}
    .quote{background:#f5f3f0;border-left:3px solid #c7bfb2;padding:10px 12px;margin:10px 0;white-space:pre-wrap}
    a{color:#0b57d0}
    .meta{color:#777;font-size:13px;margin-bottom:6px}
  </style>
</head>
<body>
<div class="wrap">
  <h1>What interesting or genuinely useful/sophisticated things are people doing with clawdbot/moltbot/openclaw bots?</h1>
  <p class="meta"><a href="https://briefing-hub.founders-0e1.workers.dev" target="_blank">← All briefings (hub)</a></p>
  <p class="sub">Primary-source briefing • verbatim quotes + links</p>
  <div class="card" style="display:flex;gap:10px;align-items:center;">
    <button id="runBtn">Run again today</button>
    <details><summary>ℹ prompt</summary><pre id="runPromptView" style="white-space:pre-wrap;font-size:.82rem;max-width:760px;"></pre></details>
    <span id="runStatus" class="meta"></span>
  </div>

  <div class="card">
    <h2>Primary-source entries</h2>
    <div id="entries"></div>
  </div>

  <p class="sub">API: <a href="/api/sources">/api/sources</a> • Dataset: <a href="/api/dataset">/api/dataset</a></p>
</div>
<script>
const RUN_PROMPT = `You are producing a daily intelligence briefing for me.
Topic: What interesting or genuinely useful/sophisticated things are people doing with clawdbot/moltbot/openclaw bots?
Date: ${new Date().toISOString().slice(0,10)}
Use Browser Use + SuperGrok on X and relevant primary-source links.
Format as email-style with one-sentence take and linked evidence.
Update openclaw-ecosystem-briefing with today's dated run and refresh global Signals.`;
runPromptView.textContent = RUN_PROMPT;
runBtn.onclick = async () => {
  runStatus.textContent = 'sending...';
  const r = await fetch('/api/run', { method:'POST', headers:{'content-type':'application/json'}, body: JSON.stringify({ prompt: RUN_PROMPT })});
  const j = await r.json().catch(()=>({}));
  runStatus.textContent = j.ok ? 'sent to Slack trigger' : `failed (${j.error||r.status})`;
};
(async function(){
  const data = await (await fetch('/sources.json')).json();
  const root = document.getElementById('entries');
  data.entries.forEach(e => {
    const d = document.createElement('div');
    d.className = 'quote';
    d.innerHTML = `<div class="meta"><strong>${e.cluster}</strong> • ${e.project} • ${e.author || ''} ${e.date || ''}</div><div>${e.verbatim}</div><div><a href="${e.sourceUrl}" target="_blank">Primary source link</a></div>`;
    root.appendChild(d);
  });
})();
</script>
</body>
</html>
